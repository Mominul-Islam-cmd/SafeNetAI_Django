<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New_Students_Form</title>
    <!-- Add Bootstrap CSS -->
<link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <!-- Form with Bootstrap styling -->
   <!-- 1st form img and name -->
<form action="" class="container mt-5">
    <div class="form-group">
        <!-- Image upload field -->
        <label for="imageUpload">Upload Image:</label>
        <input type="file" class="form-control-file" id="imageUpload" name="imageUpload" accept="image/*">
    </div>

    <div class="form-group">
        <!-- Name input field -->
        <label for="name">Name:</label>
        <input type="text" class="form-control" id="name" name="name" required>
    </div>
    
    <div class="form-group">
        <!-- Current Project Title input field -->
        <label for="projectTitle">Current Project Title:</label>
        <input type="text" class="form-control" id="projectTitle" name="projectTitle" required>
    </div>

    <!-- Submit button -->
    <button type="submit" class="btn btn-primary">Submit</button>
</form>

<!-- 2nd form for University Name, Department Name, Research Interest, and Session -->
<form action="" class="container mt-5">
    <div class="form-group">
        <!-- University Name input field -->
        <label for="universityName">University Name:</label>
        <input type="text" class="form-control" id="universityName" name="universityName" required>
    </div>

    <div class="form-group">
        <!-- Department Name input field -->
        <label for="departmentName">Department Name:</label>
        <input type="text" class="form-control" id="departmentName" name="departmentName" required>
    </div>
    
    <div class="form-group">
        <!-- Research Interest input field -->
        <label for="researchInterest">Research Interest:</label>
        <input type="text" class="form-control" id="researchInterest" name="researchInterest" required>
    </div>

    <div class="form-group">
        <!-- Session input field -->
        <label for="session">Session:</label>
        <input type="text" class="form-control" id="session" name="session" required>
    </div>

    <!-- Submit button -->
    <button type="submit" class="btn btn-primary">Submit</button>
</form>

<!-- Add Bootstrap JS and dependencies -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
